<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Anton&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 720px;
    background: radial-gradient(circle at 20% 20%, #2a0e4a 0%, #0a0a0a 60%),
                radial-gradient(circle at 80% 80%, #4d1a00 0%, transparent 60%),
                #0a0a0a;
    color: white;
    font-family: 'Anton', 'Bebas Neue', sans-serif;
    position: relative;
    overflow: hidden;
  }

  /* Diagonal brush strokes background */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      125deg,
      transparent 0px, transparent 40px,
      rgba(91, 33, 182, 0.18) 41px, rgba(91, 33, 182, 0.18) 70px,
      transparent 71px, transparent 110px,
      rgba(255, 107, 0, 0.18) 111px, rgba(255, 107, 0, 0.18) 140px
    );
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 1280px;
    height: 720px;
    display: grid;
    grid-template-rows: 80px 1fr 200px;
  }

  /* Header — CSS-only "14 GARRAS" */
  .header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    font-family: 'Anton', sans-serif;
    font-size: 48px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: white;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(74, 20, 140, 0.6) 30%,
      rgba(255, 107, 0, 0.6) 70%,
      transparent 100%);
    border-bottom: 4px solid #ff6b00;
    text-shadow: 2px 2px 0 #000;
  }
  .header .num { color: #b794f6; }
  .header .name { color: white; }
  .header .tag {
    font-size: 16px;
    color: #ff6b00;
    letter-spacing: 4px;
    align-self: center;
    margin-left: 14px;
  }

  /* Speakers row */
  .speakers {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 30px;
    padding: 0 40px;
    overflow: hidden;
  }
  .speaker {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    justify-content: flex-end;
  }
  .speaker img {
    height: 95%;
    max-height: 380px;
    width: auto;
    object-fit: contain;
    filter: drop-shadow(0 6px 16px rgba(0,0,0,0.7));
  }
  .speaker-name {
    background: linear-gradient(180deg, #ff8c00, #ff5500);
    color: white;
    padding: 4px 14px;
    font-size: 16px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border-radius: 3px;
    margin-top: -6px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    font-family: 'Anton', sans-serif;
  }

  /* Title — banner fixo no rodapé */
  .title {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 16px 60px;
    font-family: 'Anton', sans-serif;
    font-size: 56px;
    line-height: 1.05;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: white;
    background: linear-gradient(180deg,
      rgba(0,0,0,0.5) 0%,
      rgba(0,0,0,0.95) 25%);
    text-shadow:
      3px 3px 0 #000,
      -2px -2px 0 #000,
      2px -2px 0 #000,
      -2px 2px 0 #000;
    border-top: 4px solid #ff6b00;
  }
  .title .highlight {
    color: #ff6b00;
    display: inline-block;
    margin: 0 6px;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="num">14</span>
      <span class="name">GARRAS</span>
      <span class="tag">CORTES DO MISSÃO</span>
    </div>

    <div class="speakers">
      {% for face in faces %}
      <div class="speaker">
        <img src="{{face.image_url}}" alt="{{face.name}}">
        {% if face.name %}<div class="speaker-name">{{face.name}}</div>{% endif %}
      </div>
      {% endfor %}
    </div>

    <div class="title">
      {{title_html|safe}}
    </div>
  </div>
</body>
</html>
